{{ template "header" . }}
<div class="min-h-[calc(100vh-3.5rem)] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="glass-card max-w-md w-full p-10">
        <div class="text-center mb-10">
            <svg class="mx-auto h-12 w-12 text-[#1e3a5f]" fill="currentColor" viewBox="0 0 24 24">
                <path d="M19.5 9.5V5h-3v2l-3-2v2l-3-2v2L7.5 5v4.5L3 13v6h18v-6l-1.5-3.5z"/>
            </svg>
            <h2 class="mt-4 text-3xl font-extrabold text-gray-900 tracking-tight">Vizag Steel</h2>
            <p class="mt-1 text-sm text-gray-500">Rashtriya Ispat Nigam Limited</p>
        </div>
        
        <form class="space-y-6" action="/login" method="POST">
            {{ if .Error }}
            <div class="bg-red-50 text-red-600 p-3 rounded-lg text-sm text-center border border-red-100">
                {{ .Error }}
            </div>
            {{ end }}
            
            <div>
                <label for="emp_no" class="block text-sm font-semibold text-gray-700">Employee No</label>
                <div class="mt-1">
                    <input id="emp_no" name="emp_no" type="text" required 
                           class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-[#1e3a5f] focus:border-[#1e3a5f] sm:text-sm" 
                           placeholder="Enter employee number">
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-gray-700">Password</label>
                <div class="mt-1">
                    <input id="password" name="password" type="password" required 
                           class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-[#1e3a5f] focus:border-[#1e3a5f] sm:text-sm" 
                           placeholder="Enter password">
                </div>
            </div>

            <div class="pt-2">
                <button type="submit" 
                        class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-[#1e3a5f] hover:bg-[#152a46] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#1e3a5f] transition-colors">
                    <svg class="w-5 h-5 mr-2 -ml-1" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
                    </svg>
                    Login
                </button>
            </div>
        </form>
    </div>
</div>
{{ template "footer" . }}
