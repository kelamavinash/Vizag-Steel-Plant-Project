{{ define "header" }}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizag Steel Plant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .pattern-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background: linear-gradient(125deg, #122846 0%, #1e3a5f 40%, #e05c08 100%);
        }
        .pattern-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 16v8m-4-4h8' stroke='rgba(255,255,255,0.06)' stroke-width='1' fill='none'/%3E%3C/svg%3E");
        }
        .nav-bg {
            background-color: #1a3353;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .glass-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen">
    <div class="pattern-bg"></div>
    <div class="pattern-overlay"></div>

    {{ if .EmpName }}
    <nav class="nav-bg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">
                <!-- Left: Logo -->
                <div class="flex-shrink-0 flex items-center space-x-2 w-1/4">
                    <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M19.5 9.5V5h-3v2l-3-2v2l-3-2v2L7.5 5v4.5L3 13v6h18v-6l-1.5-3.5z"/></svg>
                    <span class="text-white font-bold text-lg tracking-tight">Vizag Steel</span>
                </div>
                
                <!-- Center: Navigation -->
                <div class="hidden md:flex flex-1 justify-center space-x-2">
                    <a href="/entry" class="text-white/80 hover:text-white hover:bg-white/10 px-4 py-1.5 rounded-full text-sm font-medium flex items-center transition-all">
                        <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        Entry
                    </a>
                    <a href="/reports" class="text-white/80 hover:text-white hover:bg-white/10 px-4 py-1.5 rounded-full text-sm font-medium flex items-center transition-all">
                        <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                        Reports
                    </a>
                    {{ if eq .Role "sys_admin" }}
                    <a href="/users" class="text-white/80 hover:text-white hover:bg-white/10 px-4 py-1.5 rounded-full text-sm font-medium flex items-center transition-all">
                        <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                        Users
                    </a>
                    {{ end }}
                </div>

                <!-- Right: Icons & Logout -->
                <div class="hidden md:flex flex-shrink-0 items-center justify-end w-1/4 space-x-4">
                    <button class="text-white/80 hover:text-white transition-colors">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                    </button>
                    <a href="/logout" title="Logout" class="text-white/80 hover:text-white hover:bg-white/10 p-1.5 rounded-full transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    </a>
                </div>
            </div>
        </div>
    </nav>
    {{ end }}

    <main class="w-full relative">
{{ end }}

{{ define "footer" }}
    </main>
</body>
</html>
{{ end }}
